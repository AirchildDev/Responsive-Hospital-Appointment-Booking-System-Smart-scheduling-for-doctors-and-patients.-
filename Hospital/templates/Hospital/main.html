{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Ensure responsiveness on mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Hospital Appointment System{% endblock %}</title>
    <!-- Link to global stylesheet -->
    <link rel="stylesheet" href="{% static 'css/stylesheet.css' %}">
</head>
<body style="background-image: url('{% static 'hospital/images/hospital_pic.png' %}');
             background-size: cover;
             background-position: center;">

    <!-- Include navbar -->
    {% include 'Hospital/navbar.html' %}

    <!-- Main content block for child templates -->
    <main>
        {% block content %}
        {% endblock %}
    </main>

    <!-- Include footer -->
    {% include 'Hospital/footer.html' %}

</body>
</html>
